version: '3.9'
services:
  backend:
    build:
      context: . #maintain context (or file system) only in the webservce folder. (i think lets keep it root since we need access to pyporject etc)
      #so for this build process and this docker file the file system begins in the webservice folder.
      dockerfile: webservice/backend.dockerfile
    container_name: gophergpt-webservice
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always
    volumes:
      - ./webservice/data:/app/data
    depends_on:        # backend needs chromadb ready before it starts
      chromadb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: frontend.dockerfile
    container_name: gophergpt-frontend
    ports:
      - "3000:3000"
    depends_on: #link both services, and change in react app to access instead of local host to backend, 
    #compose and docker do all the dns stuff for us.
      - backend
    restart: always

  chromadb:
    image: chromadb/chroma:latest
    container_name: gophergpt-chromadb
    ports:
      - "8001:8000"   # exposes to host for debugging; backend uses internal DNS (http://chromadb:8000)
    volumes:
      - chroma_data:/chroma/chroma   # named volume — persists across container restarts
    restart: always
    healthcheck:      # backend waits for this to pass before starting
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  chroma_data:        # docker manages this — use `docker volume rm gophergpt_chroma_data` to reset